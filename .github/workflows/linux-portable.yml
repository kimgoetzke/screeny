name: Build Linux Release Bundles

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-bundles:
    name: Build Linux bundles
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      name: ${{ steps.version.outputs.name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            xdg-utils \
            rpm

      - name: Resolve release version
        id: version
        run: |
          package_version=$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")
          tauri_version=$(node -p "JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json', 'utf8')).version")

          if [ "$package_version" != "$tauri_version" ]; then
            echo "Version mismatch: package.json=$package_version src-tauri/tauri.conf.json=$tauri_version" >&2
            exit 1
          fi

          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$package_version" >> "$GITHUB_OUTPUT"
          echo "name=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux release bundles
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Collect release assets
        run: |
          shopt -s nullglob
          appimages=(src-tauri/target/release/bundle/appimage/*.AppImage)
          debs=(src-tauri/target/release/bundle/deb/*.deb)
          rpms=(src-tauri/target/release/bundle/rpm/*.rpm)

          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}" >&2
            printf '%s\n' "${appimages[@]}" >&2
            exit 1
          fi

          if [ "${#debs[@]}" -ne 1 ]; then
            echo "Expected exactly one .deb, found ${#debs[@]}" >&2
            printf '%s\n' "${debs[@]}" >&2
            exit 1
          fi

          if [ "${#rpms[@]}" -ne 1 ]; then
            echo "Expected exactly one .rpm, found ${#rpms[@]}" >&2
            printf '%s\n' "${rpms[@]}" >&2
            exit 1
          fi

          mkdir -p dist
          cp "${appimages[0]}" dist/
          cp "${debs[0]}" dist/
          cp "${rpms[0]}" dist/

      - name: Upload Linux release assets
        uses: actions/upload-artifact@v7
        with:
          name: linux-release-bundles
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  release-linux-bundles:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: build-linux-bundles
    permissions:
      contents: write

    steps:
      - name: Download Linux release assets
        uses: actions/download-artifact@v8
        with:
          name: linux-release-bundles
          path: dist

      - name: Resolve downloaded release assets
        id: assets
        run: |
          shopt -s nullglob
          appimages=(dist/*.AppImage)
          debs=(dist/*.deb)
          rpms=(dist/*.rpm)

          if [ "${#appimages[@]}" -ne 1 ]; then
            echo "Expected exactly one AppImage, found ${#appimages[@]}" >&2
            printf '%s\n' "${appimages[@]}" >&2
            exit 1
          fi

          if [ "${#debs[@]}" -ne 1 ]; then
            echo "Expected exactly one .deb, found ${#debs[@]}" >&2
            printf '%s\n' "${debs[@]}" >&2
            exit 1
          fi

          if [ "${#rpms[@]}" -ne 1 ]; then
            echo "Expected exactly one .rpm, found ${#rpms[@]}" >&2
            printf '%s\n' "${rpms[@]}" >&2
            exit 1
          fi

          echo "appimage_path=${appimages[0]}" >> "$GITHUB_OUTPUT"
          echo "deb_path=${debs[0]}" >> "$GITHUB_OUTPUT"
          echo "rpm_path=${rpms[0]}" >> "$GITHUB_OUTPUT"

      - name: Fail if release tag already exists
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-linux-bundles.outputs.tag }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release tag $RELEASE_TAG already exists on origin" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub Release $RELEASE_TAG already exists" >&2
            exit 1
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.build-linux-bundles.outputs.tag }}
          RELEASE_NAME: ${{ needs.build-linux-bundles.outputs.name }}
          APPIMAGE_PATH: ${{ steps.assets.outputs.appimage_path }}
          DEB_PATH: ${{ steps.assets.outputs.deb_path }}
          RPM_PATH: ${{ steps.assets.outputs.rpm_path }}
        run: |
          gh release create "$RELEASE_TAG" \
            "$APPIMAGE_PATH" \
            "$DEB_PATH" \
            "$RPM_PATH" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_NAME" \
            --notes "(Automated Linux release - .AppImage, .deb, .rpm - for $RELEASE_NAME.)"
