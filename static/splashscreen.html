<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Screeny</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #191a1c;
      }

      body {
        color: #dfe1e5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      .splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        overflow: hidden;
      }

      .logo {
        width: 175px;
        height: 175px;
        flex-shrink: 0;
      }

      .logo svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .title {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.18em;
        color: #dfe1e5;
        text-transform: uppercase;
      }

      .version {
        margin: 0;
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.04em;
        color: #7f858c;
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
          <rect x="28" y="12" width="78" height="54" fill="#3d3f41"></rect>
          <rect x="30" y="14" width="74" height="50" fill="#161719"></rect>
          <rect x="18" y="26" width="78" height="54" fill="#4e5155"></rect>
          <rect x="20" y="28" width="74" height="50" fill="#161719"></rect>
          <rect x="8" y="40" width="78" height="54" fill="#4db8d4"></rect>
          <rect x="10" y="42" width="74" height="50" fill="#161719"></rect>
          <rect x="74" y="45" width="7" height="7" fill="#f75464"></rect>
          <rect x="20" y="52" width="6" height="6" fill="#d4d5d6"></rect>
          <rect x="20" y="58" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="26" y="58" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="20" y="64" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="32" y="64" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="20" y="70" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="38" y="70" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="20" y="76" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="26" y="76" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="32" y="76" width="6" height="6" fill="#4db8d4"></rect>
          <rect x="32" y="82" width="6" height="6" fill="#4db8d4"></rect>
        </svg>
      </div>
      <p class="title" data-testid="splash-title">SCREENY</p>
      <p class="version" data-testid="splash-version">Loading...</p>
    </div>
    <script>
      const versionElement = document.querySelector("[data-testid='splash-version']");
      const versionFromQuery = new URLSearchParams(window.location.search).get("version");

      if (versionElement && versionFromQuery) {
        versionElement.textContent = `Version ${versionFromQuery}`;
      }

      window.__TAURI_INTERNALS__
        .invoke("plugin:app|version")
        .then((version) => {
          if (versionElement) {
            versionElement.textContent = `Version ${version}`;
          }
        })
        .catch(() => {
          // Keep the loading placeholder if version lookup is not ready yet.
        });
    </script>
  </body>
</html>
